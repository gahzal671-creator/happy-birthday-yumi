<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yumi 💙</title>
<style>
body{
background:linear-gradient(135deg,#001f4d,#0047ab,#6bb6ff);
font-family:tahoma;
color:white;
text-align:center;
padding:40px;
}
.box{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:20px;
max-width:500px;
margin:auto;
}
button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:15px;
}
#msg{
display:none;
margin-top:20px;
line-height:2;
}
</style>
</head>
<body>
<div class="box">
<h1>🎉 Happy Birthday Yumi 🎉</h1>
<p>💙✨</p>
<button id="giftBtn">🎁 باز کردن هدیه</button>

<div id="msg">
<h2>برای یومی 💙</h2>
<p>
تولدت مبارک یومی ✨<br><br>
امیدوارم امسال برات پر از لبخند و اتفاق های قشنگ باشه 🌷<br><br>
✨ Yumi, You're Frizni ✨
</p>
</div>
</div>

<script>
document.getElementById("giftBtn").onclick=function(){
document.getElementById("msg").style.display="block";
};
</script>
</body>
</html>
